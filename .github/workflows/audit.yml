name: JARVIS Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # toda segunda-feira às 8h UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run project audit
        run: python scripts/auditoria_jarvis.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit_report.md
