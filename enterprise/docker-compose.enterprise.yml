version: '3.8'

services:
  # Redis para Event Bus
  redis:
    image: redis:7-alpine
    container_name: jarvis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jarvis_enterprise
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Ollama - Servidor de Modelos LLM
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - jarvis_enterprise
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.gateway
    container_name: jarvis_gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_REGISTRY_URL=http://core-orchestrator:8001
    depends_on:
      - redis
      - core-orchestrator
    networks:
      - jarvis_enterprise
    restart: unless-stopped

  # Core Orchestrator
  core-orchestrator:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.orchestrator
    container_name: jarvis_orchestrator
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=core-orchestrator
      - SERVICE_VERSION=1.0.0
    depends_on:
      - redis
    networks:
      - jarvis_enterprise
    restart: unless-stopped

  # AI Engine Service
  ai-engine:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.ai-engine
    container_name: jarvis_ai_engine
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - SERVICE_NAME=ai-engine
      - SERVICE_VERSION=1.0.0
    depends_on:
      - redis
      - ollama
    networks:
      - jarvis_enterprise
    restart: unless-stopped

  # Automation Engine Service
  automation-engine:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.automation
    container_name: jarvis_automation
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=automation-engine
      - SERVICE_VERSION=1.0.0
    depends_on:
      - redis
    networks:
      - jarvis_enterprise
    restart: unless-stopped
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - automation_data:/app/data

  # Memory Manager Service
  memory-manager:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.memory
    container_name: jarvis_memory
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=memory-manager
      - SERVICE_VERSION=1.0.0
    depends_on:
      - redis
    networks:
      - jarvis_enterprise
    restart: unless-stopped
    volumes:
      - memory_data:/app/data

  # Monitoring Dashboard
  monitoring-dashboard:
    build:
      context: .
      dockerfile: enterprise/Dockerfile.monitoring
    container_name: jarvis_monitoring
    ports:
      - "8005:8005"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - jarvis_enterprise
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local
  automation_data:
    driver: local
  memory_data:
    driver: local

networks:
  jarvis_enterprise:
    driver: bridge

