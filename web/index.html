
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis IA Conversacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            font-family: 'Roboto', Arial, sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }
        body.light {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #222;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(30, 30, 40, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            padding: 32px 24px 24px 24px;
            position: relative;
        }
        body.light .container {
            background: rgba(255,255,255,0.95);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        #chat {
            margin-top: 24px;
        }
        #messages {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
            max-height: 320px;
            overflow-y: auto;
        }
        #messages li {
            background: #2a2d3a;
            margin-bottom: 8px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            animation: fadeIn 0.4s;
            display: flex;
            align-items: center;
        }
        #messages li.user {
            background: #3a3f5a;
            text-align: right;
            flex-direction: row-reverse;
        }
        body.light #messages li {
            background: #e3eafc;
        }
        body.light #messages li.user {
            background: #cfd8e3;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 12px;
            background: #0072ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            font-size: 1.2rem;
        }
        #input {
            width: 75%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background: #232526;
            color: #fff;
            margin-right: 8px;
        }
        body.light #input {
            background: #e3eafc;
            color: #222;
        }
        #sendBtn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            background: linear-gradient(90deg, #0072ff 0%, #00c6ff 100%);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #sendBtn:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .panel {
            position: absolute;
            top: 32px;
            right: -220px;
            width: 200px;
            background: #232526;
            color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 16px;
            transition: right 0.3s;
        }
        body.light .panel {
            background: #e3eafc;
            color: #222;
        }
        .panel.open {
            right: 24px;
        }
        .panel h2 {
            font-size: 1.1rem;
            margin-top: 0;
        }
        .theme-btn {
            margin-top: 12px;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #0072ff;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .panel-toggle {
            position: absolute;
            top: 16px;
            right: -40px;
            background: #0072ff;
            color: #fff;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
        }
        body.light .panel-toggle {
            background: #e3eafc;
            color: #222;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .history-list {
            max-height: 100px;
            overflow-y: auto;
            padding-left: 16px;
        }
        .chat-input-row {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jarvis IA Conversacional</h1>
        <button class="panel-toggle" onclick="togglePanel()">&#9881;</button>
        <div class="panel" id="panel">
            <h2>Painel de Controle</h2>
            <button class="theme-btn" onclick="toggleTheme()">Alternar Tema</button>
            <hr>
            <div>
                <strong>Histórico:</strong>
                <ul id="history" class="history-list"></ul>
            </div>
        </div>
        <div id="chat">
            <ul id="messages"></ul>
            <div class="chat-input-row">
                <input id="input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
                <button id="sendBtn" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>
    <div class="footer">
        &copy; 2025 Jarvis | IA Local, DeepSeek, Alexa, GPT4All<br>
        <span id="status">Conectando...</span>
    </div>
    <script>
        const ws = new WebSocket('ws://localhost:8000/ws');
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const status = document.getElementById('status');
        const history = document.getElementById('history');
        let chatHistory = JSON.parse(localStorage.getItem('jarvis_history') || '[]');

        ws.onopen = function() {
            status.textContent = "Conectado ao Jarvis!";
        };
        ws.onclose = function() {
            status.textContent = "Desconectado.";
        };
        ws.onerror = function() {
            status.textContent = "Erro de conexão.";
        };
        ws.onmessage = function(event) {
            addMessage(event.data, false);
            addHistory(event.data, false);
        };

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                addMessage(text, true);
                addHistory(text, true);
                ws.send(text);
                input.value = '';
            }
        }
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        function addMessage(text, isUser) {
            const li = document.createElement('li');
            if (!isUser) {
                const avatar = document.createElement('span');
                avatar.className = 'avatar';
                avatar.textContent = 'J';
                li.appendChild(avatar);
            }
            li.appendChild(document.createTextNode(text));
            if (isUser) li.classList.add('user');
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        }
        function addHistory(text, isUser) {
            chatHistory.push({text, isUser});
            localStorage.setItem('jarvis_history', JSON.stringify(chatHistory));
            renderHistory();
        }
        function renderHistory() {
            history.innerHTML = '';
            chatHistory.slice(-10).forEach(item => {
                const li = document.createElement('li');
                li.textContent = (item.isUser ? 'Você: ' : 'Jarvis: ') + item.text;
                history.appendChild(li);
            });
        }
        renderHistory();

        // Painel de controle
        function togglePanel() {
            document.getElementById('panel').classList.toggle('open');
        }
        // Tema claro/escuro
        function toggleTheme() {
            document.body.classList.toggle('light');
        }
    </script>
</body>
</html>
