

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis IA Conversacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            font-family: 'Roboto', Arial, sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        body.light {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #222;
        }
        .main-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            gap: 32px;
        }
        .chat-container {
            flex: 1;
            max-width: 600px;
            margin: 48px 0 0 0;
            background: rgba(30, 30, 40, 0.97);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            padding: 40px 32px 32px 32px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        body.light .chat-container {
            background: rgba(255,255,255,0.97);
        }
        .chat-title {
            text-align: center;
            font-size: 2.7rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .chat-messages {
            flex: 1;
            margin-bottom: 18px;
            overflow-y: auto;
            max-height: 340px;
        }
        .message {
            background: #2a2d3a;
            margin-bottom: 10px;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 1.15rem;
            animation: fadeIn 0.4s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message.user {
            background: #3a3f5a;
            text-align: right;
            flex-direction: row-reverse;
        }
        body.light .message {
            background: #e3eafc;
        }
        body.light .message.user {
            background: #cfd8e3;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0072ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            font-size: 1.3rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            background: #232526;
            color: #fff;
            margin-right: 0;
        }
        body.light .chat-input {
            background: #e3eafc;
            color: #222;
        }
        .send-btn {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #0072ff 0%, #00c6ff 100%);
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #aaa;
            font-size: 1rem;
        }
        .side-panel {
            width: 260px;
            margin-top: 48px;
            background: #232526;
            color: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 28px 22px 22px 22px;
            position: relative;
            min-height: 320px;
        }
        body.light .side-panel {
            background: #e3eafc;
            color: #222;
        }
        .side-panel h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 18px;
        }
        .theme-btn {
            margin-bottom: 18px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #0072ff;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }
        .theme-btn:hover {
            background: #00c6ff;
        }
        .history-list {
            max-height: 120px;
            overflow-y: auto;
            padding-left: 0;
            margin-top: 10px;
            font-size: 0.98rem;
        }
        .history-list li {
            margin-bottom: 6px;
            color: #bbb;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
                gap: 0;
            }
            .side-panel {
                width: 100%;
                margin-top: 24px;
                min-height: 0;
            }
            .chat-container {
                margin-top: 24px;
                max-width: 98vw;
                padding: 24px 8vw 24px 8vw;
            }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="chat-container">
            <div class="chat-title">Jarvis IA Conversacional</div>
            <div class="chat-messages" id="messages"></div>
            <div class="chat-input-row">
                <input id="input" class="chat-input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
                <button id="sendBtn" class="send-btn" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
        <div class="side-panel">
            <h2>Painel de Controle</h2>
            <button class="theme-btn" onclick="toggleTheme()">Alternar Tema</button>
            <hr>
            <div>
                <strong>Histórico:</strong>
                <ul id="history" class="history-list"></ul>
            </div>
        </div>
    </div>
    <div class="footer">
        &copy; 2025 Jarvis | IA Local, DeepSeek, Alexa, GPT4All<br>
        <span id="status">Conectando...</span>
    </div>
    <script>
        const ws = new WebSocket('ws://localhost:8000/ws');
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const status = document.getElementById('status');
        const history = document.getElementById('history');
        let chatHistory = JSON.parse(localStorage.getItem('jarvis_history') || '[]');

        ws.onopen = function() {
            status.textContent = "Conectado ao Jarvis!";
        };
        ws.onclose = function() {
            status.textContent = "Desconectado.";
        };
        ws.onerror = function() {
            status.textContent = "Erro de conexão.";
        };
        ws.onmessage = function(event) {
            addMessage(event.data, false);
            addHistory(event.data, false);
        };

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                addMessage(text, true);
                addHistory(text, true);
                ws.send(text);
                input.value = '';
            }
        }
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message' + (isUser ? ' user' : '');
            if (!isUser) {
                const avatar = document.createElement('span');
                avatar.className = 'avatar';
                avatar.textContent = 'J';
                msgDiv.appendChild(avatar);
            }
            msgDiv.appendChild(document.createTextNode(text));
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        function addHistory(text, isUser) {
            chatHistory.push({text, isUser});
            localStorage.setItem('jarvis_history', JSON.stringify(chatHistory));
            renderHistory();
        }
        function renderHistory() {
            history.innerHTML = '';
            chatHistory.slice(-10).forEach(item => {
                const li = document.createElement('li');
                li.textContent = (item.isUser ? 'Você: ' : 'Jarvis: ') + item.text;
                history.appendChild(li);
            });
        }
        renderHistory();

        function toggleTheme() {
            document.body.classList.toggle('light');
        }
    </script>
</body>
</html>
