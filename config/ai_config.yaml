# ============================================================================
# JARVIS 5.0 - AI Configuration
# ============================================================================
# Este arquivo centraliza todas as configurações de IA, redes neurais e LLMs.
# Evita valores hardcoded no código-fonte.
# ============================================================================

# === AI AGENT CONFIGURATION ===
ai_agent:
  # ReAct loop settings
  max_react_turns: 5  # Máximo de turnos de raciocínio-ação
  screenshot_timeout: 5.0  # Timeout para captura de tela (segundos)
  quick_response_threshold: 0.05  # 50ms - respostas instantâneas
  
  # Thresholds de complexidade para roteamento
  complexity_thresholds:
    simple: 0.2    # Tarefas triviais (comandos básicos)
    medium: 0.5    # Tarefas normais (pesquisas, edições)
    complex: 0.8   # Tarefas avançadas (análise, código)
  
  # Privacy settings
  privacy_thresholds:
    public: 0      # Sem dados sensíveis
    low: 1         # Dados genéricos
    medium: 2      # Dados pessoais básicos
    high: 3        # Senhas, documentos privados
    critical: 4    # Dados financeiros, segredos
  
  # Performance settings
  cache_enabled: true
  cache_ttl: 3600  # 1 hora
  max_screenshot_size_mb: 10
  parallel_processing: true

# === BRAIN ROUTER CONFIGURATION ===
brain_router:
  # Ollama Models (Local LLMs)
  ollama_models:
    tier_ultra:  # Genius tier - Alta complexidade
      - "deepseek-r1:8b"
      - "deepseek-r1:14b"
      - "llama3.3:70b"
    
    tier_pro:  # Versatile tier - Média-Alta complexidade
      - "gemma3:4b"    # ✅ Preferido (instrução 2026-02-10)
      - "qwen2.5:7b"
      - "llama3.1:8b"
      - "llama3.2"
      - "mistral"
    
    tier_fast:  # Fast tier - Uso geral econômico
      - "gemma3:4b"    # ✅ Rápido e capaz
      - "qwen2.5:3b"   # ✅ Fallback leve
      - "phi3.5"
      - "phi3"
      - "gemma2:9b"
  
  # Hardware requirements per tier
  hardware_requirements:
    tier_ultra:
      min_ram_gb: 6.0
      min_vram_gb: 4.0
    tier_pro:
      min_ram_gb: 4.0
      min_vram_gb: 2.0
    tier_fast:
      min_ram_gb: 1.5
      min_vram_gb: 0.0
  
  # Required models for maintenance checks
  required_models:
    - "deepseek-r1:8b"
    - "qwen2.5:7b"
    - "gemma3:4b"
  
  # Cloud models (Selective - Gemini Removed)
  cloud_models:
    tier_ultra:
      - "deepseek-chat"
      - "deepseek-reasoner"
      - "gpt-4-turbo"
    tier_pro:
      - "claude-3-haiku"
      - "gpt-3.5-turbo"
  
  offline_mode: false # Set to true to force strictly local
  
  # Routing thresholds
  complexity_thresholds:
    simple: 0.2
    medium: 0.5
    complex: 0.8
    ultra_complex: 0.9
  
  # Latency requirements (seconds)
  latency_limits:
    ultra_low: 0.1
    low: 0.5
    moderate: 2.0
    high: 5.0
    flexible: 10.0
  
  # Ollama connection
  ollama_url: "http://localhost:11434"
  ollama_timeout: 2.0  # Timeout para descoberta de modelos
  
  # Offline mode
  offline_mode: false  # Se true, força uso exclusivo de recursos locais

# === CONTINUAL LEARNING CONFIGURATION ===
continual_learning:
  # Ativar sistemas de aprendizado autônomo
  enabled: true
  
  # Feedback Loop
  feedback_loop:
    enabled: true
    database_path: "data/learning/feedback.db"
    auto_collect_implicit: true  # Coleta feedback implícito (tempo de resposta, repetições)
    
  # Continual Learner (Training Automation)
  continual_learner:
    enabled: true
    feedback_threshold: 100  # Número de feedbacks para disparar treinamento
    check_interval: 3600  # Verificar a cada 1 hora (segundos)
    training_batch_size: 2
    gradient_accumulation_steps: 2
    num_epochs: 1
    save_steps: 100
    
  # Knowledge Distiller (Golden Commands)
  knowledge_distiller:
    enabled: true
    min_usage_count: 2  # Comando precisa ser usado X vezes para virar "Golden"
    max_examples: 3  # Máximo de exemplos a injetar no contexto
    similarity_threshold: 0.6  # Threshold para matching fuzzy
    
  # Dream Cycle (Nighttime Training)
  dream_cycle:
    enabled: true
    night_start_hour: 22  # 22h - 10 PM
    night_end_hour: 6     # 6h - 6 AM
    min_idle_duration: 300  # 5 minutos de inatividade
    max_cpu_percent: 20.0  # CPU abaixo de 20%
    max_memory_percent: 80.0  # RAM abaixo de 80%
    check_interval: 60  # Verificar a cada 1 minuto
    
  # Local Brain (Model to Train)
  local_brain:
    model_path: "Qwen/Qwen2.5-1.5B-Instruct"
    autoload: true
    lora_enabled: true  # Usar LoRA/QLoRA para fine-tuning eficiente
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    load_in_4bit: true  # Quantização 4-bit para eficiência
    
  # Training Output
  output:
    checkpoints_dir: "data/models/continual"
    backup_enabled: true
    max_checkpoints: 5  # Manter apenas os 5 melhores checkpoints
    
  # Knowledge Distillation (External → Local)
  distillation:
    enabled: true
    teacher_models: ["gemini", "deepseek-r1:14b", "llama3.3:70b"]  # Modelos externos de elite
    confidence_threshold: 0.6  # Consulta tutor com mais frequência
    distill_temperature: 1.5  
    auto_research_hf: true    # Pesquisa autônoma no Hugging Face
  
  # Fallback strategy
  fallback_strategy: "local"  # 'local', 'cloud', ou 'error'

# === LOCAL BRAIN CONFIGURATION ===
local_brain:
  # Native micro-LLM settings
  model_path: "Qwen/Qwen2.5-1.5B-Instruct"
  model_type: "qwen"
  max_context_length: 2048
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  
  # Quantization
  quantization: "int8"  # 'fp16', 'int8', 'int4', ou 'none'
  
  # Device
  device: "auto"  # 'auto' agora detecta OpenVINO (Iris Xe) via ComputeOrchestrator
  
  # Autoloading
  autoload: true

# === NEURAL MEMORY CONFIGURATION ===
neural_memory:
  # ChromaDB settings
  chroma_persist_dir: "data/neural_memory"
  collection_name: "jarvis_memory"
  
  # Embedding model
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_device: "cpu"
  
  # Memory retrieval
  max_memories_retrieved: 3
  similarity_threshold: 0.7
  
  # Context window
  short_term_memory_size: 10  # Últimos N turnos
  long_term_memory_enabled: true
  
  # Auto-summarization
  auto_summarize_after_turns: 5
  summary_model: "local"  # 'local' ou 'cloud'

# === TRAINER CONFIGURATION ===
trainer:
  # Default training config
  default_config:
    model_name: "meta-llama/Llama-3-8B"
    model_max_length: 2048
    load_in_4bit: true
    load_in_8bit: false
    
    # LoRA settings
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    
    # Training hyperparameters
    num_train_epochs: 3
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 0.0002
    weight_decay: 0.01
    
    # Optimization
    optimizer: "adamw_8bit"
    lr_scheduler_type: "cosine"
    bf16: true
    
    # Checkpointing
    save_steps: 500
    save_total_limit: 3
    
    # Early stopping
    early_stopping_patience: 3
  
  # Paths
  output_dir: "models/training/continual"
  cache_dir: "data/cache/models"
  
  # Dataset collection
  auto_collect_interactions: true
  min_quality_score: 0.7  # 0-1, filtro de qualidade

# === VISION CONFIGURATION ===
vision:
  # OCR settings
  ocr_engine: "easyocr"  # 'easyocr', 'pytesseract', ou 'paddleocr'
  ocr_languages: ["pt", "en"]
  ocr_gpu: true
  
  # YOLO settings
  yolo_model: "models/vision/yolov8n.pt"
  yolo_confidence: 0.5
  yolo_device: "auto" # Intel Iris Xe acelerada via OpenVINO
  
  # Screenshot settings
  screenshot_format: "png"
  screenshot_quality: 85  # Para JPEG
  screenshot_resize_max: 1920  # Redimensionar se > que isso

  # Proactive Monitor (Sentinela)
  proactive_monitor:
    check_interval: 300.0  # Tempo entre varreduras (segundos)
    cooldown: 600.0        # Espera após um gatilho (segundos)
    sensitivity: 0.15      # % de mudança para disparar análise (0.0 a 1.0)

# === PERFORMANCE MONITORING ===
performance:
  # Metrics collection
  collect_metrics: true
  metrics_interval: 60  # segundos
  
  # Performance thresholds
  max_response_time: 5.0  # segundos
  max_memory_usage_gb: 8.0
  max_cpu_usage_percent: 80.0
  
  # Auto-optimization
  auto_optimize: true
  optimize_on_high_load: true

# === SECURITY ===
security:
  # Validation
  validate_actions: true
  validate_file_access: true
  validate_network_access: true
  
  # Restricted paths
  restricted_paths:
    - "C:\\Windows\\System32"
    - "C:\\Program Files"
    - "/etc"
    - "/usr"
    - "/bin"
  
  # Restricted domains
  restricted_domains:
    - "localhost"  # Exceto para Ollama
  
  # Action limits
  max_actions_per_turn: 10
  max_file_size_mb: 100

# === AUDIO & VOICE ===
audio:
  vad_calibration_duration: 3.0  # Tempo de escuta para calibrar ruído ambiente
  default_tts: "edge"            # 'edge', 'gtts', 'xtts'
  offline_tts_fallback: true
  response_caching: true

# === DEBUGGING ===
debug:
  verbose_logging: true
  log_model_responses: true
  log_action_execution: true
  save_failed_screenshots: true
  profiling_enabled: true
  neural_reflection: true  # Ativa o Raio-X do pensamento no terminal
