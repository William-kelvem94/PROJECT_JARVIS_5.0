# Configuração de Exemplo para Treinamento Externo JARVIS 5.0
# Este arquivo demonstra como configurar diferentes tipos de treinamento

# Configuração geral
project_root: "."
data_dir: "data"
models_dir: "models"

# Configuração específica por componente
llm_config:
  model_name: "microsoft/DialoGPT-medium"
  dataset_path: "data/training_data/conversations.json"
  output_dir: "models/fine_tuned"
  training_args:
    num_train_epochs: 3
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    learning_rate: 5e-5
    warmup_steps: 500
    weight_decay: 0.01
    logging_steps: 10
    save_steps: 500
    evaluation_strategy: "steps"
    eval_steps: 500

vision_config:
  model_type: "yolov8"
  dataset_path: "data/training_data/vision_dataset"
  epochs: 50
  batch_size: 16
  img_size: 640

distributed_config:
  use_distributed: true
  backend: "nccl"
  num_gpus: 0  # Auto-detect
  num_nodes: 1
  gradient_accumulation_steps: 1
  sync_batch_norm: true

continual_config:
  learning_rate: 0.001
  memory_size: 1000
  update_frequency: 100
  plasticity_decay: 0.9

feedback_config:
  collection_interval: 3600  # 1 hora
  batch_size: 32
  reward_model: "models/reward_model"
  dpo_beta: 0.1

dream_config:
  dream_duration: 3600  # 1 hora
  creativity_threshold: 0.7
  consolidation_epochs: 10
  sleep_cycles: 3

study_config:
  topic: "Inteligência Artificial"  # Pode ser sobrescrito por --topic
  project_root: "."
  output_dir: "data/learning/training_data"
  auto_train: false  # Se true, inicia treinamento automático após gerar dados