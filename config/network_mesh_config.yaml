network_mesh:
  enabled: true
  google_drive:
    enabled: true
    credentials_path: "data/network_mesh/google_credentials/client_secret.json"
    sync_interval: 300  # 5 minutos
  local_network:
    enabled: true
    discovery_port: 7777
    discovery_interval: 30
  privacy:
    encrypt_packets: true
    trust_only_same_user: true
    max_bandwidth_mbps: 10