version: '3.8'

services:
  jarvis-ultimate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jarvis-ultimate
    ports:
      - "8000:8000"  # API web
      - "8001:8001"  # WebSocket
    volumes:
      # Dados persistentes
      - ./data:/app/data
      # Acesso ao Ollama no host (se estiver rodando no host)
      - /tmp/ollama:/tmp/ollama
      # Configuração
      - ./config:/app/config:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_PROVIDER=ollama
      - PYTHONPATH=/app
      # Configurações de voz (limitadas no Docker)
      - VOICE_MODE=text  # Docker sem acesso direto ao microfone
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Para acesso ao host (experimental)
    # network_mode: host  # Descomente para acesso direto ao host
    # privileged: true   # Acesso a dispositivos do host

  # Ollama service (opcional - rodar Ollama no container)
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - jarvis-network
    restart: unless-stopped
    profiles:
      - with-ollama  # Só inicia se especificado: docker-compose --profile with-ollama up

  # Redis para cache avançado (opcional)
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - jarvis-network
    restart: unless-stopped
    profiles:
      - with-redis

  # ChromaDB separado (opcional para melhor performance)
  chromadb:
    image: chromadb/chroma:latest
    container_name: jarvis-chromadb
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - jarvis-network
    restart: unless-stopped
    profiles:
      - with-chromadb

networks:
  jarvis-network:
    driver: bridge

volumes:
  ollama-data:
  redis-data:
  chroma-data: