version: '3.8'

services:
  # Serviço Ollama - Modelos LLM Locais Gratuitos
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - jarvis_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Serviço JARVIS - Assistente IA
  jarvis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jarvis_ai
    ports:
      - "8000:8000"
    volumes:
      - ../config:/app/config
      - ../plugins:/app/plugins
      - ../web:/app/web
      - jarvis_logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=codellama:7b
      - LLM_PROVIDER=ollama
      - DISPLAY=:99
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 10s

volumes:
  ollama_data:
    driver: local
  jarvis_logs:
    driver: local

networks:
  jarvis_network:
    driver: bridge

