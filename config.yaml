# JARVIS SINGULARITY - Configurações

# Identificação do dispositivo
device_id: "desktop_main"

# Módulo 1: Hive Mind (Consciência Distribuída)
hive_mind:
  enabled: true
  remote_name: "gdrive"  # Nome do remote do rclone
  remote_path: "JARVIS_Hive"  # Pasta no Google Drive
  sync_interval: 300  # Segundos (5 minutos)

# Módulo 3: Cérebro Híbrido
brain:
  router: "auto"  # auto, groq, gemini
  groq_api_key: ""  # Obter em: https://console.groq.com
  gemini_api_key: ""  # Obter em: https://makersuite.google.com/app/apikey

# Módulo 2: Sentidos
senses:
  vision_level: "auto"  # auto, fast, deep
  hearing_model: "base"  # tiny, base, small, medium, large

# Módulo 4: Comunicação
mouth:
  tts_engine: "edge"  # edge, xtts
  voice: "pt-BR-FranciscaNeural"  # Voz do Edge-TTS
  barge_in: true  # Permitir interrupção

# Módulo 6: Interface
interface:
  hud_enabled: true
  transparency: 0.9
  orb_color: "#00D9FF"  # Azul ciano

# Módulo 5: IoT Reverso
world:
  fauxmo_enabled: false  # Ativar integração Alexa
  tuya_devices: []  # Lista de dispositivos Tuya

# Módulo 7: Auto-Preservação
guardian:
  watchdog_enabled: true
  safe_mode_threshold: 3  # Crashes antes de entrar em modo seguro
  privacy_filter: true  # Filtrar dados sensíveis
